version: "3.9"

services:
  ai-phone-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-phone-agent
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: "3300"
      PUBLIC_URL: ${PUBLIC_URL}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_PROJECT: ${OPENAI_PROJECT}
      OPENAI_ORGANIZATION: ${OPENAI_ORGANIZATION}
      OPENAI_MODEL: ${OPENAI_MODEL}
      OPENAI_BETA_HEADER: ${OPENAI_BETA_HEADER}
      OPENAI_CONNECT_RETRIES: ${OPENAI_CONNECT_RETRIES}
      OPENAI_CONNECT_TIMEOUT_S: ${OPENAI_CONNECT_TIMEOUT_S}
      OPENAI_SSL_CERT_FILE: ${OPENAI_SSL_CERT_FILE}
      OPENAI_SSL_INSECURE: ${OPENAI_SSL_INSECURE}
      ASSISTANT_NAME: ${ASSISTANT_NAME}
      SUPPORT_PRODUCT: ${SUPPORT_PRODUCT}
      VOICE: ${VOICE}
      SYSTEM_MESSAGE: ${SYSTEM_MESSAGE}
      AI_SPEAKS_FIRST: ${AI_SPEAKS_FIRST}
      INTERRUPT_DEBOUNCE_MS: ${INTERRUPT_DEBOUNCE_MS}
      TRANSCRIPTION_MODEL: ${TRANSCRIPTION_MODEL:-gpt-4o-mini-transcribe}
      TRANSCRIPTION_LANGUAGE: ${TRANSCRIPTION_LANGUAGE:-en}
      TRANSCRIPTION_NOISE_REDUCTION: ${TRANSCRIPTION_NOISE_REDUCTION:-near_field}
      QUALYS_DYNAMIC_OPENERS: ${QUALYS_DYNAMIC_OPENERS}
      KNOWLEDGE_BACKEND_URL: ${KNOWLEDGE_BACKEND_URL}
      KNOWLEDGE_BACKEND_NAME: ${KNOWLEDGE_BACKEND_NAME}
      KNOWLEDGE_BACKEND_KIND: ${KNOWLEDGE_BACKEND_KIND}
      KNOWLEDGE_BACKEND_API_KEY: ${KNOWLEDGE_BACKEND_API_KEY}
      KNOWLEDGE_BACKEND_AUTH_HEADER: ${KNOWLEDGE_BACKEND_AUTH_HEADER}
      KNOWLEDGE_BACKEND_AUTH_SCHEME: ${KNOWLEDGE_BACKEND_AUTH_SCHEME}
      KNOWLEDGE_BACKEND_TIMEOUT_S: ${KNOWLEDGE_BACKEND_TIMEOUT_S}
      KNOWLEDGE_RESULT_LIMIT: ${KNOWLEDGE_RESULT_LIMIT}
      KNOWLEDGE_BACKEND_SSL_CERT_FILE: ${KNOWLEDGE_BACKEND_SSL_CERT_FILE:-}
      KNOWLEDGE_BACKEND_SSL_INSECURE: ${KNOWLEDGE_BACKEND_SSL_INSECURE}
      KNOWLEDGE_CACHE_TTL_S: ${KNOWLEDGE_CACHE_TTL_S:-180}
      SEARCHUNIFY_UID: ${SEARCHUNIFY_UID}
      SEARCHUNIFY_ACCESS_TOKEN: ${SEARCHUNIFY_ACCESS_TOKEN}
      SEARCHUNIFY_SID: ${SEARCHUNIFY_SID}
      SEARCHUNIFY_SEARCH_UID: ${SEARCHUNIFY_SEARCH_UID}
      SEARCHUNIFY_COOKIE: ${SEARCHUNIFY_COOKIE}
      SEARCHUNIFY_ORIGIN: ${SEARCHUNIFY_ORIGIN}
      SEARCHUNIFY_REFERER: ${SEARCHUNIFY_REFERER}
      SEARCHUNIFY_RESULTS_PER_PAGE: ${SEARCHUNIFY_RESULTS_PER_PAGE}
      SEARCHUNIFY_LANGUAGE: ${SEARCHUNIFY_LANGUAGE}
      SEARCHUNIFY_SORTBY: ${SEARCHUNIFY_SORTBY}
      SEARCHUNIFY_ORDER_BY: ${SEARCHUNIFY_ORDER_BY}
      LOG_LEVEL: ${LOG_LEVEL}
      LOG_OPENAI_EVENTS: ${LOG_OPENAI_EVENTS}
      SHOW_TIMING_MATH: ${SHOW_TIMING_MATH}
      DEMO_LOOKUP_QUERY: ${DEMO_LOOKUP_QUERY}
      DEMO_LOOKUP_PRODUCT_AREA: ${DEMO_LOOKUP_PRODUCT_AREA}
    ports:
      - "3300:3300"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:3300/health', timeout=50).read()",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
