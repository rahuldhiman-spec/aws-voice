<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bluebeam Voice Demo</title>
    <link rel="stylesheet" href="./static/styles.css" />
  </head>
  <body>
    <div class="shell">
      <main class="handover-card">
        <p id="eyebrowLabel" class="eyebrow">Bluebeam Voice Experience</p>
        <h1>Start the support call.</h1>
        <p id="heroText" class="hero-text">
          A clean handoff screen with one action: launch the live browser-based assistant.
        </p>

        <section id="callSurface" class="call-surface" data-state="idle" data-activity="idle">
          <div class="pulse-ring ring-one" aria-hidden="true"></div>
          <div class="pulse-ring ring-two" aria-hidden="true"></div>
          <div class="pulse-ring ring-three" aria-hidden="true"></div>

          <div class="wave-cluster" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
          </div>

          <button id="connectButton" class="call-button" type="button">
            <span id="buttonLabel">Start Call</span>
          </button>
        </section>

        <p id="callHint" class="call-hint" data-tone="neutral" aria-live="polite">
          Allow microphone access when prompted.
        </p>
      </main>
    </div>

    <audio id="remoteAudio" autoplay playsinline></audio>
    <script src="./static/app.js" defer></script>
  </body>
</html>
